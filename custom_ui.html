<script>
(function () {
  "use strict";

  function applyGeant4UI() {
    document.title = "Geant4";

    // ── 1. Override logo text ──────────────────────────────────────────────
    document.querySelectorAll(".noVNC_logo").forEach(function (logo) {
      if (!logo.dataset.g4Done) {
        logo.dataset.g4Done = "1";
        logo.innerHTML = "Geant4";
      }
    });

    // ── 2. Subtitle right after logo ──────────────────────────────────────
    if (!document.querySelector(".g4-subtitle")) {
      var logo = document.querySelector(".noVNC_logo");
      if (logo && logo.parentNode) {
        var sub = document.createElement("div");
        sub.className = "g4-subtitle";
        sub.textContent = "для 11 кафедры";
        logo.parentNode.insertBefore(sub, logo.nextSibling);
      }
    }

    // ── 3. Rename connect button ─────────────────────────────────────────
    var connBtn = document.getElementById("noVNC_connect_button");
    if (connBtn) {
      var inner = connBtn.querySelector("div") || connBtn;
      if (inner.textContent.trim() !== "Initialize Protocol →") {
        inner.textContent = "Initialize Protocol →";
      }
    }

    // ── 4. Style password dialog ──────────────────────────────────────────
    var pwdInput = document.getElementById("noVNC_password_input");
    if (pwdInput && !pwdInput.dataset.g4Done) {
      pwdInput.dataset.g4Done = "1";
      pwdInput.placeholder = "Enter secure payload";

      // Wrap in icon wrapper
      var wrap = document.createElement("div");
      wrap.className = "g4-input-wrap";
      pwdInput.parentNode.insertBefore(wrap, pwdInput);
      wrap.appendChild(pwdInput);

      // Add label above
      var label = document.createElement("div");
      label.className = "g4-field-label";
      label.textContent = "ACCESS KEY";
      wrap.parentNode.insertBefore(label, wrap);
    }

    // ── 5. Rename send-credentials button ────────────────────────────────
    var sendBtn = document.getElementById("noVNC_send_credentials_button");
    if (sendBtn && sendBtn.textContent.trim() !== "Initialize Protocol →") {
      sendBtn.textContent = "Initialize Protocol →";
    }

    // ── 6. Emergency override link ───────────────────────────────────────
    var credDlg = document.getElementById("noVNC_credentials_dlg");
    if (credDlg && !document.querySelector(".g4-emergency")) {
      var emg = document.createElement("a");
      emg.className = "g4-emergency";
      emg.textContent = "Emergency Override";
      emg.href = "#";
      emg.onclick = function (e) { e.preventDefault(); };
      credDlg.appendChild(emg);
    }
    var connDlg = document.getElementById("noVNC_connect_dlg");
    if (connDlg && !connDlg.querySelector(".g4-emergency")) {
      var emg2 = document.createElement("a");
      emg2.className = "g4-emergency";
      emg2.textContent = "Emergency Override";
      emg2.href = "#";
      emg2.onclick = function (e) { e.preventDefault(); };
      connDlg.appendChild(emg2);
    }

    // ── 7. Footer ─────────────────────────────────────────────────────────
    if (!document.getElementById("g4-footer")) {
      var footer = document.createElement("div");
      footer.id = "g4-footer";
      footer.innerHTML =
        '<div>GEANT4 V11.3 &bull; DEPARTMENT 11</div>' +
        '<div class="g4-footer-links">' +
          '<span>SYSTEM STATUS</span>' +
          '<span>TECHNICAL DOCS</span>' +
        '</div>';
      document.body.appendChild(footer);
    }

    // ── 8. Floating glowing dots ─────────────────────────────────────────
    var dots = [
      { cls: "pink",   color: "#ff3366", glow: "rgba(255,51,102,0.8)",  size: 6, top: "20%", left: "10%" },
      { cls: "green",  color: "#00ffaa", glow: "rgba(0,255,170,0.8)",   size: 4, top: "10%", right: "30%" },
      { cls: "yellow", color: "#ffcc00", glow: "rgba(255,204,0,0.8)",   size: 5, bottom: "40%", right: "15%" },
      { cls: "white",  color: "#ffffff", glow: "rgba(255,255,255,0.8)", size: 3, bottom: "30%", left: "25%" }
    ];
    dots.forEach(function (d) {
      if (!document.querySelector(".g4-dot." + d.cls)) {
        var dot = document.createElement("div");
        dot.className = "g4-dot " + d.cls;
        dot.style.cssText =
          "background:" + d.color + ";" +
          "width:" + d.size + "px;height:" + d.size + "px;" +
          "box-shadow:0 0 14px 6px " + d.glow + ";" +
          (d.top    ? "top:"    + d.top    + ";" : "") +
          (d.bottom ? "bottom:" + d.bottom + ";" : "") +
          (d.left   ? "left:"   + d.left   + ";" : "") +
          (d.right  ? "right:"  + d.right  + ";" : "");
        document.body.appendChild(dot);
      }
    });
  }

  // Run immediately and every 200ms (to catch noVNC's dynamic DOM updates)
  document.addEventListener("DOMContentLoaded", function () {
    applyGeant4UI();
    setInterval(applyGeant4UI, 200);
  });
})();
</script>
