<style>
/* =========================================================
   GEANT4 — Light Minimal Premium Theme (inline override)
   ========================================================= */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap');

/* Global reset */
html, body {
  margin: 0 !important;
  padding: 0 !important;
  width: 100% !important;
  height: 100% !important;
  font-family: 'Inter', -apple-system, sans-serif !important;
  background: linear-gradient(160deg, #fdf6f0 0%, #faf0ea 30%, #f8ece4 60%, #fdf6f0 100%) !important;
  color: #3d3a36 !important;
  overflow: hidden !important;
}

/* Kill the gray container */
#noVNC_container {
  width: 100% !important;
  height: 100% !important;
  background: transparent !important;
  background-color: transparent !important;
  border-radius: 0 !important;
  border-bottom-right-radius: 0 !important;
  border-top-left-radius: 0 !important;
}

#noVNC_screen {
  background: transparent !important;
  background-color: transparent !important;
}

/* Center area */
#noVNC_center {
  background: transparent !important;
  background-color: transparent !important;
}

/* Flask icon */
.g4-icon {
  display: block;
  text-align: center;
  margin-bottom: 18px;
}
.g4-icon svg {
  width: 44px;
  height: 44px;
  stroke: #9e9589;
  stroke-width: 1.5;
  fill: none;
}

/* Logo text */
.noVNC_logo {
  font-family: 'Playfair Display', Georgia, serif !important;
  font-size: 46px !important;
  font-weight: 500 !important;
  color: #3d3a36 !important;
  -webkit-text-fill-color: #3d3a36 !important;
  text-align: center !important;
  text-shadow: none !important;
  line-height: 1.2 !important;
  margin-bottom: 0 !important;
  padding: 10px !important;
  border-radius: 0 !important;
  background: none !important;
  background-color: transparent !important;
  background-image: none !important;
  -webkit-background-clip: unset !important;
  background-clip: unset !important;
}
.noVNC_logo span {
  color: #3d3a36 !important;
  -webkit-text-fill-color: #3d3a36 !important;
  background: none !important;
}

/* Subtitle */
.g4-subtitle {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 300;
  font-style: italic;
  color: #9e9589;
  text-align: center;
  margin-top: 8px;
  margin-bottom: 45px;
}

/* Dialogs: frosted glass card */
#noVNC_connect_dlg,
#noVNC_credentials_dlg {
  background: rgba(255, 255, 255, 0.55) !important;
  backdrop-filter: blur(20px) !important;
  -webkit-backdrop-filter: blur(20px) !important;
  border: 1px solid rgba(180, 170, 160, 0.15) !important;
  border-radius: 18px !important;
  box-shadow: 0 8px 40px rgba(150, 130, 110, 0.08) !important;
  padding: 40px 36px !important;
  width: 440px !important;
  max-width: 90vw !important;
  transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.4s ease, border-color 0.4s ease !important;
}
#noVNC_connect_dlg:hover,
#noVNC_credentials_dlg:hover {
  transform: scale(1.015) !important;
  box-shadow: 0 12px 50px rgba(150, 130, 110, 0.14) !important;
  border-color: rgba(180, 170, 160, 0.3) !important;
}
#noVNC_connect_dlg.noVNC_open,
#noVNC_credentials_dlg.noVNC_open {
  transform: scale(1,1) translateY(0) !important;
  visibility: visible !important;
  opacity: 1 !important;
}
#noVNC_connect_dlg .noVNC_logo {
  padding: 0 !important;
  margin-bottom: 0 !important;
  border-radius: 0 !important;
  background: none !important;
  background-color: transparent !important;
}

/* Input wrapper */
.g4-input-wrap {
  position: relative;
  width: 100%;
  margin-bottom: 18px;
}
.g4-input-wrap .g4-key-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  display: flex;
  align-items: center;
}

/* Input field */
#noVNC_password_input {
  background: rgba(255,255,255,0.7) !important;
  border: 1px solid rgba(180,170,160,0.25) !important;
  border-radius: 12px !important;
  color: #3d3a36 !important;
  font-size: 14px !important;
  font-family: 'Inter', sans-serif !important;
  padding: 16px 16px 16px 48px !important;
  width: 100% !important;
  outline: none !important;
  margin: 0 !important;
  transition: all 0.3s ease !important;
}
#noVNC_password_input:focus {
  border-color: rgba(160,140,120,0.5) !important;
  box-shadow: 0 0 0 3px rgba(180,170,160,0.1) !important;
}
#noVNC_password_input::placeholder {
  color: #b0a89e !important;
}

/* Buttons */
#noVNC_connect_button,
#noVNC_send_credentials_button {
  background: rgba(255,255,255,0.85) !important;
  background-image: none !important;
  border: 1px solid rgba(180,170,160,0.2) !important;
  border-radius: 12px !important;
  color: #5a554e !important;
  font-family: 'Inter', monospace !important;
  font-size: 12px !important;
  font-weight: 600 !important;
  letter-spacing: 2px !important;
  text-transform: uppercase !important;
  padding: 18px 20px !important;
  width: 100% !important;
  cursor: pointer !important;
  text-align: center !important;
  box-shadow: 0 2px 10px rgba(150,130,110,0.06) !important;
  transition: all 0.25s ease !important;
  display: block !important;
}
#noVNC_connect_button div {
  background: transparent !important;
  background-image: none !important;
  border: none !important;
  border-bottom-width: 0 !important;
  box-shadow: none !important;
  border-radius: 0 !important;
  padding: 0 !important;
  margin: 0 !important;
  color: inherit !important;
  font: inherit !important;
  letter-spacing: inherit !important;
  text-transform: inherit !important;
}
#noVNC_connect_button div:active {
  margin-top: 0 !important;
  border-bottom-width: 0 !important;
}
#noVNC_connect_button:hover,
#noVNC_send_credentials_button:hover {
  background: rgba(255,255,255,1) !important;
  box-shadow: 0 4px 20px rgba(150,130,110,0.12) !important;
  transform: translateY(-1px) !important;
  color: #3d3a36 !important;
}
#noVNC_connect_button img { display: none !important; }

/* Encrypted badge */
.g4-encrypted {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 500;
  color: #b0a89e;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 24px;
}
.g4-encrypted svg {
  width: 14px;
  height: 14px;
  stroke: #b0a89e;
  fill: none;
  stroke-width: 1.5;
}

/* Hide default labels/cancel but keep input visible */
#noVNC_credentials_dlg > label,
#noVNC_cancel_credentials_button {
  display: none !important;
}
#noVNC_credentials_dlg ul {
  list-style: none !important;
  margin: 0 !important;
  padding: 0 !important;
}
#noVNC_credentials_dlg ul li {
  margin: 0 !important;
  padding: 0 !important;
}
#noVNC_credentials_dlg ul li label {
  display: none !important;
}
#noVNC_credentials_dlg ul li input {
  background: rgba(255,255,255,0.7) !important;
  border: 1px solid rgba(180,170,160,0.25) !important;
  border-radius: 12px !important;
  color: #3d3a36 !important;
  font-size: 14px !important;
  font-family: 'Inter', sans-serif !important;
  padding: 16px 16px 16px 48px !important;
  width: 100% !important;
  outline: none !important;
  margin-bottom: 18px !important;
  transition: all 0.3s ease !important;
}
#noVNC_credentials_dlg ul li input:focus {
  border-color: rgba(160,140,120,0.5) !important;
  box-shadow: 0 0 0 3px rgba(180,170,160,0.1) !important;
}

/* Center credentials dialog content */
#noVNC_credentials_dlg {
  text-align: center !important;
}
#noVNC_credentials_dlg .noVNC_logo {
  padding: 0 !important;
  margin-bottom: 0 !important;
  background: none !important;
  background-color: transparent !important;
  border-radius: 0 !important;
}

/* Transition overlay */
#noVNC_transition {
  background: rgba(253,246,240,0.9) !important;
  color: #3d3a36 !important;
}
#noVNC_transition_text { color: #5a554e !important; }

/* Control bar sidebar */
#noVNC_control_bar {
  background: rgba(255,255,255,0.5) !important;
  backdrop-filter: blur(10px) !important;
  border: 1px solid rgba(180,170,160,0.12) !important;
}
#noVNC_control_bar .noVNC_logo {
  font-size: 13px !important;
}

/* Panels */
.noVNC_panel {
  background: rgba(255,255,255,0.9) !important;
  backdrop-filter: blur(10px) !important;
  border-radius: 14px !important;
  color: #3d3a36 !important;
  border: 1px solid rgba(180,170,160,0.15) !important;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08) !important;
}
.noVNC_panel .noVNC_heading {
  background-color: rgba(180,170,160,0.15) !important;
  color: #5a554e !important;
}

/* Status */
#noVNC_status { font-family: 'Inter', sans-serif !important; }

#noVNC_bell { display: none !important; }
</style>

<script>
(function () {
  "use strict";

  var FLASK_SVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M9 3h6M10 3v6.5L4.5 18.5a1 1 0 0 0 .87 1.5h13.26a1 1 0 0 0 .87-1.5L14 9.5V3" ' +
    'stroke-linecap="round" stroke-linejoin="round"/>' +
    '<path d="M7 15h10" stroke-linecap="round"/></svg>';

  var LOCK_SVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
    '<rect x="5" y="11" width="14" height="10" rx="2" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var KEY_SVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" ' +
    'stroke="#b0a89e" fill="none" stroke-width="1.5" width="18" height="18">' +
    '<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" ' +
    'stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function applyGeant4UI() {
    document.title = "Geant4";

    // 1. Flask icon
    if (!document.querySelector(".g4-icon")) {
      var logo = document.querySelector("#noVNC_connect_dlg .noVNC_logo") || document.querySelector(".noVNC_logo");
      if (logo && logo.parentNode) {
        var icon = document.createElement("div");
        icon.className = "g4-icon";
        icon.innerHTML = FLASK_SVG;
        logo.parentNode.insertBefore(icon, logo);
      }
    }

    // 2. Override logo text
    document.querySelectorAll(".noVNC_logo").forEach(function (el) {
      if (!el.dataset.g4Done) {
        el.dataset.g4Done = "1";
        el.innerHTML = "Geant4";
      }
    });

    // 3. Subtitle
    if (!document.querySelector(".g4-subtitle")) {
      var connLogo = document.querySelector("#noVNC_connect_dlg .noVNC_logo");
      if (connLogo && connLogo.parentNode) {
        var sub = document.createElement("div");
        sub.className = "g4-subtitle";
        sub.textContent = "\u0434\u043b\u044f 11 \u043a\u0430\u0444\u0435\u0434\u0440\u044b";
        connLogo.parentNode.insertBefore(sub, connLogo.nextSibling);
      }
    }

    // 4. Connect button
    var connBtn = document.getElementById("noVNC_connect_button");
    if (connBtn) {
      var inner = connBtn.querySelector("div") || connBtn;
      if (inner.textContent.indexOf("AUTHENTICATE") === -1) {
        inner.textContent = "AUTHENTICATE \u2192";
      }
    }

    // 5. Password input
    var pwdInput = document.getElementById("noVNC_password_input");
    if (pwdInput && !pwdInput.dataset.g4Done) {
      pwdInput.dataset.g4Done = "1";
      pwdInput.placeholder = "Enter Access Key";
      var wrap = document.createElement("div");
      wrap.className = "g4-input-wrap";
      pwdInput.parentNode.insertBefore(wrap, pwdInput);
      wrap.appendChild(pwdInput);
      var keyIcon = document.createElement("span");
      keyIcon.className = "g4-key-icon";
      keyIcon.innerHTML = KEY_SVG;
      wrap.insertBefore(keyIcon, pwdInput);
    }

    // 6. Send credentials button
    var sendBtn = document.getElementById("noVNC_send_credentials_button");
    if (sendBtn && sendBtn.textContent.indexOf("AUTHENTICATE") === -1) {
      sendBtn.textContent = "AUTHENTICATE \u2192";
    }

    // 7. Encrypted badge
    ["noVNC_connect_dlg", "noVNC_credentials_dlg"].forEach(function(id) {
      var dlg = document.getElementById(id);
      if (dlg && !dlg.querySelector(".g4-encrypted")) {
        var badge = document.createElement("div");
        badge.className = "g4-encrypted";
        badge.innerHTML = LOCK_SVG + " QUANTUM PHYSICS";
        dlg.appendChild(badge);
      }
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    applyGeant4UI();
    setInterval(applyGeant4UI, 200);
  });
})();
</script>
